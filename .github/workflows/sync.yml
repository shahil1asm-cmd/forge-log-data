name: Forge Log Sync

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run sync
        env:
          HABITICA_USER_ID: ${{ secrets.HABITICA_USER_ID }}
          HABITICA_API_TOKEN: ${{ secrets.HABITICA_API_TOKEN }}
        run: node sync.js
      - name: Commit updated stats
        run: |
          git config user.name "forge-log-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json stats.json
          git diff --quiet --cached || git commit -m "sync: update stats"
          git push
